<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>창업홈 관리자 · 문의 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1B5EF7;
    --primary-light: #EEF3FF;
    --accent: #FF4B2B;
    --accent2: #00C98D;
    --dark: #0A0F1E;
    --mid: #374151;
    --muted: #6B7280;
    --border: #E5E7EB;
    --light: #F9FAFB;
    --white: #FFFFFF;
    --sidebar-w: 220px;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--light); color: var(--dark); min-height: 100vh; }

  /* LOGIN */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0A0F1E 0%, #1B2A5E 100%);
  }
  .login-box {
    background: var(--white);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.3);
  }
  .login-logo { font-size: 22px; font-weight: 900; color: var(--primary); letter-spacing: -1px; margin-bottom: 8px; }
  .login-logo span { color: var(--accent); }
  .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
  .login-label { font-size: 12px; font-weight: 700; color: var(--mid); margin-bottom: 6px; display: block; }
  .login-input {
    width: 100%; padding: 12px 16px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 14px; font-family: inherit; margin-bottom: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(27,94,247,0.1); }
  .login-btn {
    width: 100%; padding: 14px;
    background: var(--primary); color: white; border: none; border-radius: 50px;
    font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
    transition: background 0.2s, transform 0.2s; margin-top: 6px;
  }
  .login-btn:hover { background: #0D3ECC; transform: translateY(-1px); }
  .login-err { font-size: 12px; color: var(--accent); margin-top: -8px; margin-bottom: 10px; display: none; }
  .login-hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 16px; }

  /* LAYOUT */
  .admin-layout { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-w); background: var(--dark); color: white;
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
  }
  .sidebar-logo {
    padding: 24px 20px 20px;
    font-size: 18px; font-weight: 900; color: white; letter-spacing: -0.8px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .sidebar-logo span { color: var(--primary); }
  .sidebar-logo small { display: block; font-size: 10px; font-weight: 400; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 12px; border-radius: 10px;
    font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.55);
    cursor: pointer; transition: all 0.2s; text-decoration: none;
  }
  .nav-item:hover { color: white; background: rgba(255,255,255,0.06); }
  .nav-item.active { color: white; background: var(--primary); font-weight: 700; }
  .nav-icon { font-size: 15px; width: 20px; text-align: center; }
  .nav-badge {
    margin-left: auto; background: var(--accent); color: white;
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 50px; min-width: 20px; text-align: center;
  }
  .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
  .logout-btn {
    display: flex; align-items: center; gap: 8px; padding: 10px 12px;
    width: 100%; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
    background: transparent; color: rgba(255,255,255,0.55);
    font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .logout-btn:hover { color: white; border-color: rgba(255,255,255,0.3); }

  /* MAIN */
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  .topbar {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-title { font-size: 16px; font-weight: 800; color: var(--dark); letter-spacing: -0.6px; }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .topbar-date { font-size: 12px; color: var(--muted); }
  .admin-tag { padding: 5px 12px; background: var(--primary-light); color: var(--primary); border-radius: 50px; font-size: 11px; font-weight: 700; }

  /* PAGE */
  .page { padding: 28px; display: none; }
  .page.active { display: block; }

  /* STAT CARDS */
  .stat-cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--white); border-radius: var(--radius);
    padding: 22px 20px; border: 1px solid var(--border); box-shadow: var(--shadow);
  }
  .stat-card-label { font-size: 12px; color: var(--muted); font-weight: 500; margin-bottom: 8px; }
  .stat-card-val { font-size: 30px; font-weight: 900; color: var(--dark); letter-spacing: -1.5px; line-height: 1; margin-bottom: 6px; }
  .stat-card-sub { font-size: 11px; color: var(--muted); }

  /* TABLE */
  .table-wrap {
    background: var(--white); border-radius: var(--radius);
    border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden;
  }
  .table-header {
    padding: 18px 22px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px;
  }
  .table-title { font-size: 15px; font-weight: 800; color: var(--dark); letter-spacing: -0.5px; }
  .table-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .filter-select {
    padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 13px; font-family: inherit; color: var(--mid); background: white; cursor: pointer; outline: none;
  }
  .search-input {
    padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 13px; font-family: inherit; color: var(--dark); width: 180px; outline: none;
  }
  .search-input:focus, .filter-select:focus { border-color: var(--primary); }
  .btn-sm {
    padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: all 0.2s; border: none;
  }
  .btn-sm-primary { background: var(--primary); color: white; }
  .btn-sm-primary:hover { background: #0D3ECC; }
  .btn-sm-ghost { background: var(--light); color: var(--mid); border: 1px solid var(--border); }
  .btn-sm-ghost:hover { border-color: var(--primary); color: var(--primary); }
  .btn-sm-danger { background: #FFF0EE; color: var(--accent); }
  .btn-sm-danger:hover { background: var(--accent); color: white; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 12px 16px; text-align: left;
    font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase;
    background: var(--light); border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #F8FAFF; }
  tbody td { padding: 14px 16px; font-size: 13px; color: var(--mid); vertical-align: middle; }
  .td-name { font-weight: 700; color: var(--dark); }
  .td-phone { font-family: monospace; letter-spacing: 0.5px; }
  .td-date { color: var(--muted); font-size: 12px; }

  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 50px; font-size: 11px; font-weight: 700; }
  .badge-new { background: #FFF3E0; color: #E65100; }
  .badge-contacted { background: #E8F5E9; color: #2E7D32; }
  .badge-done { background: var(--light); color: var(--muted); }
  .badge-plan-basic { background: var(--light); color: var(--muted); }
  .badge-plan-standard { background: var(--primary-light); color: var(--primary); }
  .badge-plan-pro { background: #F3F0FF; color: #7C3AED; }
  .badge-plan-b2b { background: #FFF0EE; color: var(--accent); }

  .empty-state { text-align: center; padding: 64px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 14px; }
  .empty-title { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 6px; }
  .empty-desc { font-size: 13px; line-height: 1.7; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--white); border-radius: 20px; width: 100%; max-width: 520px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.2); overflow: hidden;
    transform: translateY(20px); transition: transform 0.25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    padding: 22px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 16px; font-weight: 800; color: var(--dark); letter-spacing: -0.5px; }
  .modal-close {
    width: 30px; height: 30px; border-radius: 50%; background: var(--light);
    border: none; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; transition: background 0.15s;
  }
  .modal-close:hover { background: var(--border); }
  .modal-body { padding: 24px; }
  .detail-row {
    display: flex; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--light); align-items: flex-start;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { font-size: 12px; font-weight: 700; color: var(--muted); width: 80px; flex-shrink: 0; padding-top: 1px; }
  .detail-value { font-size: 14px; color: var(--dark); line-height: 1.7; flex: 1; }
  .detail-message {
    background: var(--light); border-radius: 8px; padding: 12px;
    font-size: 13px; color: var(--mid); line-height: 1.8; min-height: 60px;
  }
  .modal-footer {
    padding: 16px 24px; background: var(--light); border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
  }
  .status-select {
    padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 13px; font-family: inherit; background: white; cursor: pointer; outline: none;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--dark); color: white;
    padding: 14px 22px; border-radius: 12px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 8px 28px rgba(0,0,0,0.25); z-index: 999;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s cubic-bezier(.4,0,.2,1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* STATS PAGE */
  .chart-bar-wrap { padding: 24px; }
  .chart-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .chart-label { width: 120px; font-size: 12px; font-weight: 600; color: var(--mid); text-align: right; flex-shrink: 0; }
  .chart-bar-bg { flex: 1; height: 30px; background: var(--light); border-radius: 6px; overflow: hidden; }
  .chart-bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 10px; transition: width 0.8s ease; }
  .chart-count { width: 40px; font-size: 12px; color: var(--muted); }

  @media (max-width: 900px) { .stat-cards { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .stat-cards { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">창업홈<span>.</span></div>
    <p class="login-sub">관리자 페이지에 로그인하세요</p>
    <label class="login-label">아이디</label>
    <input type="text" class="login-input" id="loginId" placeholder="admin" onkeydown="if(event.key==='Enter')doLogin()">
    <label class="login-label">비밀번호</label>
    <input type="password" class="login-input" id="loginPw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <p class="login-err" id="loginErr">아이디 또는 비밀번호가 올바르지 않습니다.</p>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <p class="login-hint">기본 계정: admin / admin1234</p>
  </div>
</div>

<!-- ADMIN LAYOUT -->
<div class="admin-layout" id="adminLayout" style="display:none;">
  <aside class="sidebar">
    <div class="sidebar-logo">창업홈<span>.</span><small>ADMIN DASHBOARD</small></div>
    <nav class="sidebar-nav">
      <div class="nav-item active" onclick="showPage('inquiries')" id="nav-inquiries">
        <span class="nav-icon">📋</span> 문의 관리
        <span class="nav-badge" id="newBadge" style="display:none;">0</span>
      </div>
      <div class="nav-item" onclick="showPage('stats')" id="nav-stats">
        <span class="nav-icon">📊</span> 통계 현황
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">🚪 로그아웃</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">문의 관리</div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbarDate"></span>
        <span class="admin-tag">관리자</span>
      </div>
    </div>

    <!-- 문의 관리 -->
    <div class="page active" id="page-inquiries">
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-card-label">전체 문의</div>
          <div class="stat-card-val" id="st-total">0</div>
          <div class="stat-card-sub">누적 총 건수</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">미확인</div>
          <div class="stat-card-val" id="st-new" style="color:var(--accent)">0</div>
          <div class="stat-card-sub">확인 필요</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">연락 완료</div>
          <div class="stat-card-val" id="st-contacted" style="color:var(--accent2)">0</div>
          <div class="stat-card-sub">처리 중</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">상담 완료</div>
          <div class="stat-card-val" id="st-done">0</div>
          <div class="stat-card-sub">최종 완료</div>
        </div>
      </div>

      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">📋 상담 신청 목록</div>
          <div class="table-actions">
            <input type="text" class="search-input" placeholder="이름·연락처 검색" id="searchInput" oninput="renderTable()">
            <select class="filter-select" id="filterStatus" onchange="renderTable()">
              <option value="">전체 상태</option>
              <option value="미확인">미확인</option>
              <option value="연락완료">연락완료</option>
              <option value="상담완료">상담완료</option>
            </select>
            <select class="filter-select" id="filterPlan" onchange="renderTable()">
              <option value="">전체 플랜</option>
              <option value="베이직">베이직</option>
              <option value="스탠다드">스탠다드</option>
              <option value="프로페셔널">프로페셔널</option>
              <option value="B2B">B2B</option>
            </select>
            <button class="btn-sm btn-sm-primary" onclick="refreshData()">🔄 새로고침</button>
            <button class="btn-sm btn-sm-danger" onclick="clearAll()">전체 삭제</button>
          </div>
        </div>
        <div id="tableContainer"></div>
      </div>
    </div>

    <!-- 통계 -->
    <div class="page" id="page-stats">
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-card-label">이번 달 문의</div>
          <div class="stat-card-val" id="ss-month">0</div>
          <div class="stat-card-sub">건</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">전환율</div>
          <div class="stat-card-val" id="ss-rate">0%</div>
          <div class="stat-card-sub">완료 / 전체</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">인기 플랜</div>
          <div class="stat-card-val" style="font-size:20px;" id="ss-topplan">-</div>
          <div class="stat-card-sub">가장 많이 선택</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">인기 업종</div>
          <div class="stat-card-val" style="font-size:16px;letter-spacing:-0.5px;" id="ss-toptype">-</div>
          <div class="stat-card-sub">가장 많이 문의</div>
        </div>
      </div>
      <div class="table-wrap" style="margin-bottom:20px;">
        <div class="table-header"><div class="table-title">📊 요금제별 문의 현황</div></div>
        <div class="chart-bar-wrap" id="planChart"></div>
      </div>
      <div class="table-wrap">
        <div class="table-header"><div class="table-title">🏪 업종별 문의 현황</div></div>
        <div class="chart-bar-wrap" id="typeChart"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title">📋 문의 상세 정보</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <select class="status-select" id="modalStatus" onchange="updateStatus()">
        <option value="미확인">미확인</option>
        <option value="연락완료">연락완료</option>
        <option value="상담완료">상담완료</option>
      </select>
      <button class="btn-sm btn-sm-danger" onclick="deleteInquiry()">삭제</button>
      <button class="btn-sm btn-sm-ghost" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyDo-R3W1Tt3NDSCKe3cFDfk3ykKr7iVuRhDjqzO3qA4cc0lwSViZyewk3vHZ3MVgNczQ/exec';
  const ADMIN_ID = 'admin';
  const ADMIN_PW = 'admin1234';
  let cachedData = [];

  // ── AUTH ──
  function doLogin() {
    const id = document.getElementById('loginId').value;
    const pw = document.getElementById('loginPw').value;
    if (id === ADMIN_ID && pw === ADMIN_PW) {
      sessionStorage.setItem('changebhome_admin', 'true');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminLayout').style.display = 'flex';
      init();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }
  function doLogout() {
    sessionStorage.removeItem('changebhome_admin');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminLayout').style.display = 'none';
    document.getElementById('loginId').value = '';
    document.getElementById('loginPw').value = '';
  }

  // 페이지 로드 시 로그인 상태 확인
  (function checkSession() {
    if (sessionStorage.getItem('changebhome_admin') === 'true') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminLayout').style.display = 'flex';
      init();
    }
  })();

  // ── INIT ──
  function init() {
    document.getElementById('topbarDate').textContent =
      new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
    loadData();
  }

  // ── DATA ──
  function loadData() {
    document.getElementById('tableContainer').innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">불러오는 중...</div></div>';
    fetch(SCRIPT_URL + '?action=getAll')
      .then(r => r.json())
      .then(res => {
        if (res.result === 'success') {
          cachedData = res.data.map(row => ({
            id: row['ID'],
            name: row['이름'],
            phone: row['연락처'],
            biz: row['업체명'],
            type: row['업종'],
            plan: row['관심플랜'],
            message: row['문의내용'],
            date: row['신청일시'],
            status: row['상태'] || '미확인'
          }));
        }
        renderTable();
      })
      .catch(() => {
        showToast('⚠️ 데이터를 불러오지 못했습니다.');
        renderTable();
      });
  }
  function getData() { return cachedData; }

  // ── PAGES ──
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.getElementById('nav-' + name).classList.add('active');
    document.getElementById('topbarTitle').textContent = name === 'inquiries' ? '문의 관리' : '통계 현황';
    if (name === 'stats') renderStats();
  }

  // ── TABLE ──
  function renderTable() {
    const data = getData();
    const search = document.getElementById('searchInput').value.toLowerCase();
    const fStatus = document.getElementById('filterStatus').value;
    const fPlan = document.getElementById('filterPlan').value;

    const filtered = data.filter(d => {
      const ms = !search || (d.name||'').toLowerCase().includes(search) || (d.phone||'').includes(search);
      const mst = !fStatus || d.status === fStatus;
      const mp = !fPlan || d.plan === fPlan;
      return ms && mst && mp;
    });

    const newCount = data.filter(d => d.status === '미확인').length;
    const badge = document.getElementById('newBadge');
    badge.textContent = newCount;
    badge.style.display = newCount > 0 ? 'inline-block' : 'none';

    document.getElementById('st-total').textContent = data.length;
    document.getElementById('st-new').textContent = data.filter(d=>d.status==='미확인').length;
    document.getElementById('st-contacted').textContent = data.filter(d=>d.status==='연락완료').length;
    document.getElementById('st-done').textContent = data.filter(d=>d.status==='상담완료').length;

    const planBadge = { '베이직':'badge-plan-basic','스탠다드':'badge-plan-standard','프로페셔널':'badge-plan-pro','B2B':'badge-plan-b2b' };
    const statusBadge = { '미확인':'badge-new','연락완료':'badge-contacted','상담완료':'badge-done' };
    const container = document.getElementById('tableContainer');

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-title">문의가 없습니다</div>
        <div class="empty-desc">아직 접수된 문의가 없습니다.<br>홈페이지에서 문의를 제출하면 여기에 표시됩니다.</div>
      </div>`;
      return;
    }

    container.innerHTML = `<table>
      <thead><tr>
        <th>이름</th><th>연락처</th><th>업체명</th><th>업종</th><th>관심 플랜</th><th>상태</th><th>신청일시</th>
      </tr></thead>
      <tbody>${filtered.map(d => `
        <tr onclick="openModal(${d.id})">
          <td class="td-name">${d.name||''}</td>
          <td class="td-phone">${d.phone||''}</td>
          <td>${d.biz||'-'}</td>
          <td>${d.type||''}</td>
          <td><span class="badge ${planBadge[d.plan]||'badge-plan-basic'}">${d.plan||''}</span></td>
          <td><span class="badge ${statusBadge[d.status]||'badge-new'}">${d.status||'미확인'}</span></td>
          <td class="td-date">${d.date||''}</td>
        </tr>`).join('')}
      </tbody></table>`;
  }

  // ── STATS ──
  function renderStats() {
    const data = getData();
    const now = new Date();
    const thisMonth = data.filter(d => {
      try { const dt = new Date(d.date); return dt.getFullYear()===now.getFullYear() && dt.getMonth()===now.getMonth(); } catch(e){ return false; }
    });
    document.getElementById('ss-month').textContent = thisMonth.length;
    const rate = data.length ? Math.round(data.filter(d=>d.status==='상담완료').length/data.length*100) : 0;
    document.getElementById('ss-rate').textContent = rate + '%';

    const planCount = {};
    data.forEach(d => { if(d.plan) planCount[d.plan] = (planCount[d.plan]||0)+1; });
    const topPlan = Object.entries(planCount).sort((a,b)=>b[1]-a[1])[0];
    document.getElementById('ss-topplan').textContent = topPlan ? topPlan[0] : '-';

    const typeCount = {};
    data.forEach(d => { if(d.type) typeCount[d.type] = (typeCount[d.type]||0)+1; });
    const topType = Object.entries(typeCount).sort((a,b)=>b[1]-a[1])[0];
    document.getElementById('ss-toptype').textContent = topType ? topType[0] : '-';

    const plans = ['베이직','스탠다드','프로페셔널','B2B'];
    const colors = ['#9CA3AF','#1B5EF7','#7C3AED','#FF4B2B'];
    const maxP = Math.max(...plans.map(p=>planCount[p]||0), 1);
    document.getElementById('planChart').innerHTML = plans.map((p,i) => {
      const cnt = planCount[p]||0;
      return `<div class="chart-row">
        <div class="chart-label">${p}</div>
        <div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${Math.round(cnt/maxP*100)}%;background:${colors[i]};">
          ${cnt>0?`<span style="color:white;font-size:11px;font-weight:700;">${cnt}건</span>`:''}
        </div></div>
        <div class="chart-count">${cnt}건</div>
      </div>`;
    }).join('');

    const typeEntries = Object.entries(typeCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const maxT = Math.max(...typeEntries.map(e=>e[1]), 1);
    document.getElementById('typeChart').innerHTML = typeEntries.length
      ? typeEntries.map(([t,c]) => `<div class="chart-row">
          <div class="chart-label">${t}</div>
          <div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${Math.round(c/maxT*100)}%;background:var(--primary);opacity:0.8;"></div></div>
          <div class="chart-count">${c}건</div>
        </div>`).join('')
      : '<p style="color:var(--muted);font-size:13px;">데이터가 없습니다.</p>';
  }

  // ── MODAL ──
  let currentId = null;
  function openModal(id) {
    currentId = id;
    const d = getData().find(x => x.id === id);
    if (!d) return;
    const sb = { '미확인':'badge-new','연락완료':'badge-contacted','상담완료':'badge-done' };
    document.getElementById('modalBody').innerHTML = `
      <div class="detail-row"><div class="detail-label">이름</div><div class="detail-value">${d.name||''}</div></div>
      <div class="detail-row"><div class="detail-label">연락처</div><div class="detail-value" style="font-family:monospace;">${d.phone||''}</div></div>
      <div class="detail-row"><div class="detail-label">업체명</div><div class="detail-value">${d.biz||'-'}</div></div>
      <div class="detail-row"><div class="detail-label">업종</div><div class="detail-value">${d.type||''}</div></div>
      <div class="detail-row"><div class="detail-label">관심 플랜</div><div class="detail-value">${d.plan||''}</div></div>
      <div class="detail-row"><div class="detail-label">신청일시</div><div class="detail-value" style="color:var(--muted);font-size:13px;">${d.date||''}</div></div>
      <div class="detail-row"><div class="detail-label">상태</div><div class="detail-value"><span class="badge ${sb[d.status]||'badge-new'}">${d.status||'미확인'}</span></div></div>
      <div class="detail-row" style="flex-direction:column;gap:8px;">
        <div class="detail-label" style="width:auto;">문의 내용</div>
        <div class="detail-message">${d.message||'(내용 없음)'}</div>
      </div>`;
    document.getElementById('modalStatus').value = d.status || '미확인';
    document.getElementById('modalOverlay').classList.add('open');
  }
  function closeModal(e) {
    if (!e || e.target === document.getElementById('modalOverlay'))
      document.getElementById('modalOverlay').classList.remove('open');
  }
  function updateStatus() {
    const newStatus = document.getElementById('modalStatus').value;
    const idx = cachedData.findIndex(d => String(d.id) === String(currentId));
    if (idx > -1) {
      cachedData[idx].status = newStatus;
      fetch(SCRIPT_URL + '?action=updateStatus&id=' + currentId + '&status=' + encodeURIComponent(newStatus))
        .catch(() => {});
      renderTable();
      showToast('✅ 상태 업데이트 완료');
    }
  }
  function deleteInquiry() {
    if (!confirm('이 문의를 삭제하시겠습니까?')) return;
    cachedData = cachedData.filter(d => String(d.id) !== String(currentId));
    fetch(SCRIPT_URL + '?action=delete&id=' + currentId).catch(() => {});
    renderTable(); closeModal(); showToast('🗑️ 삭제됐습니다.');
  }
  function clearAll() {
    if (!confirm('전체 문의를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
    cachedData = [];
    renderTable(); showToast('🗑️ 화면에서 삭제됐습니다. 시트는 직접 삭제해주세요.');
  }

  // ── 새로고침 ──
  function refreshData() { loadData(); showToast('🔄 새로고침 중...'); }

  // ── SAMPLE ──
  function addSampleData() {
    showToast('샘플은 홈페이지 문의 폼에서 테스트 제출해주세요.');
  }

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
